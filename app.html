<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="StudyBuddy Pro — KI-gestützte Lernplattform für Schüler. Karteikarten, Prüfungsmodus, KI-Tutor und Lernplan mit Spaced Repetition.">
<meta name="theme-color" content="#6366f1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StudyBuddy">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.svg">
<title>StudyBuddy Pro</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
<!-- DOMPurify XSS-Schutz (lokal gebündelt für CDN-Ausfallsicherheit) -->
<script src="js/vendor/purify.min.js"></script>
<!-- Supabase JS Client (lokal gebündelt) -->
<script src="js/vendor/supabase.js"></script>
<!-- Chart.js für Eltern-Dashboard (lokal gebündelt) -->
<script src="js/vendor/chart.umd.min.js"></script>
</head>
<body>
<div id="app" style="display:none;">
  <!-- Sidebar Overlay (Mobile) -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" role="navigation" aria-label="Hauptnavigation">
    <div class="sidebar-logo">
      <h2>StudyBuddy <span style="color:var(--acc-yellow)">Pro</span></h2>
      <span id="sb-version">v2.0</span>
    </div>
    <div class="sidebar-user">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="sidebar-avatar" id="sb-avatar">?</div>
        <div>
          <div class="sidebar-name" id="sb-name">Lädt...</div>
          <div class="sidebar-role" id="sb-role"></div>
        </div>
      </div>
    </div>
    <div class="xp-bar-wrap" id="xp-wrap">
      <div class="xp-label">
        <span>⭐ XP</span>
        <span id="xp-val">0</span>
      </div>
      <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav" role="menubar">
      <!-- Dynamisch gefüllt je nach Rolle -->
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" onclick="doLogout()" style="color:rgba(255,255,255,.4);" role="menuitem">
        <span class="nav-icon">🚪</span> Abmelden
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main" role="main">
    <header id="header" role="banner">
      <div style="display:flex;align-items:center;gap:12px;">
        <button id="menu-toggle" onclick="toggleSidebar()" aria-label="Menü öffnen" aria-expanded="false">☰</button>
        <h2 class="header-title" id="header-title">Dashboard</h2>
      </div>
      <div class="header-right">
        <div class="streak-chip" id="streak-chip" aria-label="Lernstreak">🔥 <span id="streak-val">0</span> Tage</div>
        <button id="log-btn" onclick="openLog()" title="Aktivitäts-Log öffnen" aria-label="Log öffnen" style="
          background:none;border:1px solid var(--border);border-radius:var(--r-md);
          padding:6px 10px;cursor:pointer;font-size:14px;color:var(--t2);
          display:flex;align-items:center;gap:5px;position:relative;
          transition:background .15s;
        " onmouseover="this.style.background='var(--bg-2)'" onmouseout="this.style.background='none'">
          📋 <span id="log-badge" style="
            display:none;position:absolute;top:-5px;right:-5px;
            background:var(--danger,#ef4444);color:white;
            border-radius:99px;font-size:10px;font-weight:700;
            padding:1px 5px;min-width:16px;text-align:center;
          ">0</span>
        </button>
      </div>
    </header>
    <div id="content" role="region" aria-label="Seiteninhalt" aria-live="polite">
      <div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;">
        <div class="spinner" style="width:32px;height:32px;"></div>
        <p style="color:var(--t3);">Lädt…</p>
      </div>
    </div>
  </main>
</div>

<!-- Toast -->
<div id="toast" role="alert" aria-live="assertive"></div>

<!-- Log-Drawer -->
<div id="log-drawer" role="dialog" aria-modal="true" aria-label="Aktivitäts-Log" style="
  position:fixed;inset:0;z-index:9000;display:none;
">
  <!-- Backdrop -->
  <div onclick="closeLog()" style="position:absolute;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);"></div>
  <!-- Panel -->
  <div id="log-panel" style="
    position:absolute;top:0;right:0;bottom:0;width:min(480px,100vw);
    background:var(--bg-card);border-left:1px solid var(--border);
    display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.18);
    transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  ">
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0;">
      <div>
        <div style="font-weight:700;font-size:16px;">📋 Aktivitäts-Log</div>
        <div id="log-count" style="font-size:12px;color:var(--t3);margin-top:2px;"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-secondary btn-sm" onclick="clearLog()" title="Log löschen">🗑 Löschen</button>
        <button onclick="closeLog()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--t2);line-height:1;padding:4px;">✕</button>
      </div>
    </div>
    <!-- Filter-Chips -->
    <div style="display:flex;gap:6px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;">
      <button class="btn btn-sm btn-primary" id="lf-all"     onclick="filterLog('all')"    >Alle</button>
      <button class="btn btn-sm btn-secondary" id="lf-error"   onclick="filterLog('error')"  >❌ Fehler</button>
      <button class="btn btn-sm btn-secondary" id="lf-success" onclick="filterLog('success')" >✅ Erfolg</button>
      <button class="btn btn-sm btn-secondary" id="lf-warning" onclick="filterLog('warning')" >⚠️ Warnung</button>
      <button class="btn btn-sm btn-secondary" id="lf-info"    onclick="filterLog('info')"   >ℹ️ Info</button>
    </div>
    <!-- Entries -->
    <div id="log-entries" style="flex:1;overflow-y:auto;padding:8px 0;"></div>
  </div>
</div>

/**
 * Übersetzungs-Helper. Gibt den String für den aktuellen Nutzer zurück.
 * Platzhalter {0}, {1}, … werden durch die übergebenen Argumente ersetzt.
 * Fallback: Deutsch, dann der Key selbst.
 * @param {string} key
 * @param {...string} args
 */
function t(key, ...args) {
  const lang = getCurrentLang();
  const str = (I18N[lang] || I18N.de)[key] ?? I18N.de[key] ?? key;
  return args.reduce((s, a, i) => s.replace(`{${i}}`, a ?? ''), str);
}

/** Aktuelle Unterrichtssprache des Nutzers (Standard: 'de') */
function getCurrentLang() { return U?.language || 'de'; }

/**
 * Gibt die Fächerliste für ein Kind zurück.
 * Priorität: 1. Individuelle Fächer (DB), 2. Standard nach Sprache+Klasse
 * @param {object} [child] — Child-Objekt (default: aktueller Nutzer U)
 */
function getChildSubjects(child) {
  const c = child || U;
  if (Array.isArray(c?.subjects) && c.subjects.length) return c.subjects;
  const lang  = c?.language || 'de';
  const grade = Number(c?.grade) || 9;
  const byLang = CFG.SUBJECTS_BY_LANG[lang] || CFG.SUBJECTS_BY_LANG['de'];
  const grades = Object.keys(byLang).map(Number).sort((a,b)=>a-b);
  const g = grades.reduce((prev,curr) => Math.abs(curr-grade)<Math.abs(prev-grade)?curr:prev);
  return byLang[g] || CFG.SUBJECTS[9];
}

/**
 * Baut den KI-Tutor System-Prompt in der richtigen Sprache.
 * Sprachfächer (Englisch, Français…) werden in der Sprache des Fachs beantwortet.
 */
function buildTutorPrompt(subject, grade, lang) {
  lang = lang || 'de';
  const subjectLang  = CFG.LANG_SUBJECTS[subject];
  const isLangSubj   = subjectLang && subjectLang !== lang;
  const answerLang   = isLangSubj ? (CFG.LANG_NAMES[subjectLang] || subjectLang) : null;
  const langNote     = isLangSubj ? ` Antworten und Erklärungen auf ${answerLang}.` : '';
  const langNoteEn   = isLangSubj ? ` Answers and explanations in ${answerLang}.` : '';
  const langNoteFr   = isLangSubj ? ` Réponses et explications en ${answerLang}.` : '';
  const langNoteEs   = isLangSubj ? ` Respuestas y explicaciones en ${answerLang}.` : '';
  const p = {
    de: `Du bist StudyBuddy, ein freundlicher KI-Lernassistent für Klasse ${grade} im Fach ${subject}. Erkläre verständlich auf Deutsch, max. 3–4 Sätze.${langNote}`,
    en: `You are StudyBuddy, a friendly AI tutor for Year ${grade} studying ${subject}. Explain clearly in English, max 3–4 sentences.${langNoteEn}`,
    fr: `Tu es StudyBuddy, un assistant IA pour la classe ${grade} en ${subject}. Explique clairement en français, max 3–4 phrases.${langNoteFr}`,
    es: `Eres StudyBuddy, un asistente IA para el curso ${grade} en ${subject}. Explica claramente en español, máx. 3-4 frases.${langNoteEs}`,
  };
  return p[lang] || p['de'];
}

/**
 * Baut Exam System-Prompt + User-Prompt für die KI-Prüfungsgenerierung.
 */
function buildExamPrompt(subject, grade, lang, num) {
  lang = lang || 'de';
  const subjectLang = CFG.LANG_SUBJECTS[subject];
  const isLangSubj  = subjectLang && subjectLang !== lang;
  const qLang       = isLangSubj ? (CFG.LANG_NAMES[subjectLang] || subjectLang) : null;
  const qNote       = isLangSubj ? ` Questions and options in ${qLang}.` : '';
  const sys = {
    de: `Prüfungsersteller für Klasse ${grade}. Nur JSON.${isLangSubj ? ` Fragen und Optionen auf ${qLang}.` : ''}`,
    en: `Exam creator for Year ${grade}. JSON only.${qNote}`,
    fr: `Créateur d'examen classe ${grade}. JSON uniquement.${isLangSubj ? ` Questions et options en ${qLang}.` : ''}`,
    es: `Creador de examen curso ${grade}. Solo JSON.${isLangSubj ? ` Preguntas y opciones en ${qLang}.` : ''}`,
  };
  const user = {

/**
 * Speichert eine Einzel-Einstellung eines Kindes in Supabase und in U.children.
 * @param {string} childId
 * @param {object} updates — z.B. {language:'en'} oder {school_url:'https://...'}
 */
async function updateChildSetting(childId, updates) {
  U.children = (U.children||[]).map(c => c.id===childId ? {...c, ...updates} : c);
  save();
  if (sb) {
    const { error } = await sb.from('children').update(updates).eq('id', childId).eq('parent_id', U.id);
    if (error) toast('❌ Fehler beim Speichern: ' + error.message);
  }
}

/**
 * Fügt einem Kind ein Fach hinzu oder entfernt es.
 */
async function toggleChildSubject(childId, subject, add) {
  const child = (U.children||[]).find(c=>c.id===childId);
  if (!child) return;
  const current = child.subjects || getChildSubjects(child);
  const updated  = add
    ? (current.includes(subject) ? current : [...current, subject])
    : current.filter(s => s !== subject);
  await updateChildSetting(childId, { subjects: updated });
  childrenPage(document.getElementById('content'));
}

/**
 * Für Kind-Selbstverwaltung: Fach hinzufügen oder entfernen.
 * Aktualisiert U.subjects und Supabase, dann Settings neu rendern.
 * @param {string} subject — Fachname
 * @param {boolean} add    — true = hinzufügen, false = entfernen
 */
async function childToggleSubject(subject, add) {
  if (!subject || !U?.isChild || !U?.id) return;
  const current = Array.isArray(U.subjects) ? U.subjects : getChildSubjects(U);
  const updated  = add
    ? (current.includes(subject) ? current : [...current, subject])
    : current.filter(s => s !== subject);
  U.subjects = updated;
  save();
  if (sb) {
    await sb.from('children').update({ subjects: updated }).eq('id', U.id);
  }
  settings(document.getElementById('content'));
}

/**
 * Setzt die Fächer des Kindes auf die Standard-Fächer der Schulsprache/Klasse zurück.
 */
async function childResetSubjects() {
  if (!U?.isChild || !U?.id) return;
  U.subjects = null;
  save();
  if (sb) {
    await sb.from('children').update({ subjects: null }).eq('id', U.id);
  }
  settings(document.getElementById('content'));
}

// INPUT SANITIZATION (XSS-Schutz)
// ═══════════════════════════════════════════════════════════════════════════
/**
 * Bereinigt einen String vollständig für sichere Ausgabe in innerHTML.
 * Verwendet DOMPurify wenn verfügbar, sonst manuelles HTML-Escaping.
 * Alle Nutzer-Eingaben MÜSSEN durch safe() oder safeHTML() geleitet werden.
 * @param {*} str — Zu bereinigender Wert (nicht-Strings werden '' zurückgegeben)
 * @returns {string} Sicherer HTML-Text ohne Tags oder Attribute
 */
function safe(str) {
  if (typeof str !== 'string') return '';
  if (window.DOMPurify) return DOMPurify.sanitize(str, { ALLOWED_TAGS:[], ALLOWED_ATTR:[] });
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/**
 * Bereinigt HTML-String für sichere Ausgabe in innerHTML — erlaubt eine
 * Whitelist an Formatierungs-Tags (b, i, code, ul, li usw.).
 * Für KI-Antworten und Rich-Text-Inhalte verwenden.
 * @param {string} html — HTML-String mit erlaubten Formatierungen
 * @returns {string} Bereinigtes HTML
 */
function safeHTML(html) {
  if (window.DOMPurify) return DOMPurify.sanitize(html, {
    ALLOWED_TAGS:['b','i','em','strong','br','p','ul','ol','li','code','pre','span'],
    ALLOWED_ATTR:['class','style']
  });
  return safe(html);
}

// ═══════════════════════════════════════════════════════════════════════════
// MULTI-PROVIDER KI — via Supabase Edge Function (sicherer Proxy)
// ═══════════════════════════════════════════════════════════════════════════
/**
 * Sendet eine Anfrage an den KI-Provider über den serverseitigen Proxy.
 * Authentifizierungsablauf:
 *   1. Auth-Nutzer → JWT-Bearer-Token; Edge Function liest Key aus DB (sicher)
 *   2. Kind/Demo   → Key aus RAM (vom Elternteil geerbt) wird im Body mitgegeben
 *
 * Beinhaltet:
 *   - In-Memory-Cache (Cache-Dauer: CFG.CACHE_TTL)
 *   - Rate-Limiting (CFG.RATE_LIMIT Anfragen/Minute)
 *   - Fehlerweiterleitung an aufrufende Funktion (throw)
 *
 * @async
 * @param {Array<{role:'user'|'assistant', content:string}>} messages — Gesprächsverlauf
 * @param {string}  system   — System-Prompt (Rolle und Kontext des Assistenten)
 * @param {number}  [maxTok=400] — Max. Tokens der Antwort
 * @param {boolean} [useCache=true] — Cache nutzen (false für Echtzeit-Chat)
 * @returns {Promise<string>} KI-Antwort als Plaintext
 * @throws {Error} Bei Rate-Limit, fehlendem Key oder Proxy-Fehler
 */
async function ai(messages, system, maxTok=400, useCache=true) {
  const prov = AI.provider;

  // Cache
  const ckBase = prov + system + JSON.stringify(messages);
  if (useCache) {
    const ck = 'ai_' + btoa(encodeURIComponent(ckBase)).slice(0,40);
    const cached = _aiCache.get(ck);
    if (cached && Date.now() < cached.exp) return cached.val;
  }

  // Rate-Limit
  if (_aiReqs >= CFG.RATE_LIMIT) throw new Error('Zu viele KI-Anfragen — bitte kurz warten');
  _aiReqs++;
  if (!_aiReset) _aiReset = setTimeout(() => { _aiReqs=0; _aiReset=null; }, 60000);

  // Headers aufbauen
  const headers = { 'Content-Type': 'application/json' };
  const payload = { provider: prov, messages, system, maxTok };

  // Supabase-Gateway benötigt immer Bearer-Token — SB_KEY (anon JWT)
  headers['Authorization'] = 'Bearer ' + SB_KEY;

  const ramKey = activeKey();

  if (ramKey) {
    // Pfad 1: Key im RAM (gerade eingegeben oder noch nicht aus DB gelöscht)
    payload.apiKey = ramKey;
  } else if (U?.isChild && U?.id) {
    // Pfad 2: Kind → Proxy holt Parent-Key aus DB anhand childId
    payload.childId = U.id;
  } else if (sb && U?.id && !U?.isChild) {
    // Pfad 3: Authentifizierter Elternteil → Key aus DB laden und im Body senden
    // (User-JWT vom Gateway für Edge Functions abgelehnt → Key client-seitig aus DB holen)
    const { data: keyRow } = await sb.from('api_keys')
      .select('api_key')
      .eq('user_id', U.id)
      .eq('provider', prov)
      .maybeSingle();
    if (keyRow?.api_key) {
      payload.apiKey = keyRow.api_key;
    } else {
      throw new Error(`${PROVIDERS[prov]?.name||prov} API Key fehlt — bitte in Einstellungen eintragen`);
    }
  } else {
    throw new Error(`${PROVIDERS[prov]?.name||prov} API Key fehlt — Elternteil trägt ihn in Einstellungen ein`);
  }

  const r = await fetch(CFG.AI_PROXY, {
    method: 'POST',
    headers,
    body: JSON.stringify(payload),
  });

  const data = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(data?.error || `KI-Fehler ${r.status}`);
  const text = data.text || '';

  if (useCache && text) {
    const ck = 'ai_' + btoa(encodeURIComponent(ckBase)).slice(0,40);
    _aiCache.set(ck, { val: text, exp: Date.now() + CFG.CACHE_TTL });
  }
  return text;
}

// AUTH & INIT
// ═══════════════════════════════════════════════════════════════════════════
/**
 * Haupt-Initialisierungsfunktion — wird beim DOMContentLoaded aufgerufen.
 * Auth-Kaskade (erste Übereinstimmung gewinnt):
 *   1. Supabase-Session (echter Login via E-Mail/OAuth)
 *   2. sessionStorage 'sb_session' (Redirect von index.html nach Login)
 *   3. sessionStorage 'sb_demo_login' (Demo-Modus)
 *   4. sessionStorage 'sb_child_session' (Kind-PIN-Login)
 *   → Kein U gefunden: Redirect zur Landing Page (/)
 *
 * Nach erfolgreicher Auth: AI-Keys laden, Sidebar rendern, Dashboard anzeigen.
 * @async
 * @returns {Promise<void>}
 */
async function init() {
  load();

  // 1. Supabase-Session prüfen (echter Login)
  if (sb) {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      // Profil aus DB laden
      const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
      // Kinder laden falls Elternteil
      let children = [];
      if (profile?.role === 'parent') {
        const { data: ch } = await sb.from('children').select('*').eq('parent_id', session.user.id);
        children = ch || [];
      }
      U = {
        id: session.user.id,
        email: session.user.email,
        full_name: profile?.full_name || session.user.email,
        role: profile?.role || 'student',
        grade: profile?.grade || 9,
        school: profile?.school || 'Gymnasium',
        subscription: profile?.subscription || 'free',
        children,
      };
      save();
    }
  }

  // 2. sessionStorage aus frischem Login (Weiterleitung von index.html)
  if (!U) {
    const sbSession = sessionStorage.getItem('sb_session');
    if (sbSession) {
      sessionStorage.removeItem('sb_session');
      const { user, profile } = JSON.parse(sbSession);
      U = {
        id: user.id, email: user.email,
        full_name: profile?.full_name || user.user_metadata?.full_name || user.email,
        role: profile?.role || user.user_metadata?.role || 'student',
        grade: profile?.grade || user.user_metadata?.grade || 9,
        school: profile?.school || user.user_metadata?.school || 'Gymnasium',
        subscription: 'free', children: [],
      };
      save();
    }
  }

  // 3. Kind-Session (PIN-Login von Landing-Page)
  if (!U) {
    const childSession = sessionStorage.getItem('sb_child_session');
    if (childSession) {
      sessionStorage.removeItem('sb_child_session');
      const c = JSON.parse(childSession);
      U = {
        id: c.child_id,
        email: '',
        full_name: c.child_name,
        role: 'student',
        grade: c.grade || 9,
        school: 'Gymnasium',
        subscription: 'free',
        children: [],
        isChild: true,
        parentEmail: c.parent_email,
        language: c.language || 'de',
        schoolUrl: c.school_url || '',
        subjects: c.subjects || null,
        canManageSubjects: c.can_manage_subjects || false,
      };
      save();
    }
  }

  if (!U) { window.location.href = '/'; return; }

  // AI-Keys laden: Kind erbt Keys vom Elternteil, sonst eigene Keys
  if (U.isChild && U.parentEmail) {
    loadAIKeys(U.parentEmail);
  } else {
    loadAIKeys(U.email);
  }

  // Konfigurierte Provider aus Supabase DB laden (Auth-Nutzer)
  // Wird geawaitert damit hasActiveKey() sofort korrekt ist (z.B. in Prüfungsmodus)
  await loadConfiguredProviders();

  // Daten für aktuellen User laden (pro-User-Key)
  loadDataForUser(U.id);

  document.getElementById('app').style.display = 'flex';
  renderSidebar();
  _updateLogBadge(); // Fehler-Badge aus vorherigen Sessions anzeigen
  goPage('dashboard');
}

// ROUTER
// ═══════════════════════════════════════════════════════════════════════════
/**
 * Navigiert zu einer Seite und rendert den Inhalt im #content-Container.
 * Unterstützt sowohl synchrone als auch asynchrone Render-Funktionen.
 * Async-Fehler werden über einen gemeinsamen Fehler-Handler angezeigt.
 *
 * @param {string} page   — Seitenname ('dashboard' | 'flashcards' | 'tutor' | ...)
 * @param {Object} [params={}] — Optionale Parameter für die Render-Funktion
 */
function goPage(page, params={}) {
  _page = page;
  closeSidebar();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  const content = document.getElementById('content');
  content.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;padding:60px"><div class="spinner" style="width:28px;height:28px;"></div></div>';

  const pages = {
    dashboard, subjects, flashcards, tutor, exam, planner, pomodoro,
    parent: parentDash, children: childrenPage, teacher: teacherDash,
    subscription, settings
  };

  const render = pages[page];
  if (!render) { goPage('dashboard'); return; }

  const pageTitleKeys = {
    dashboard:'page.dashboard', subjects:'page.subjects', flashcards:'page.flashcards',
    tutor:'page.tutor', exam:'page.exam', planner:'page.planner', pomodoro:'page.pomodoro',
    parent:'page.dashboard', children:'Kinder', teacher:'Lehrer-Dashboard',
    subscription:'page.subscription', settings:'page.settings'
  };
  const titles = {
    dashboard:'Dashboard', subjects:'Fächer', flashcards:'Karteikarten', tutor:'KI-Tutor',
    exam:'Prüfungsmodus', planner:'Lernplan', pomodoro:'Pomodoro',
    parent:'Eltern-Übersicht', children:'Kinder', teacher:'Lehrer-Dashboard',
    subscription:'Abo & Preise', settings:'Einstellungen'
  };
  const pageTitle = pageTitleKeys[page] ? t(pageTitleKeys[page]) : (titles[page] || page);
  document.getElementById('header-title').textContent = pageTitle;
  document.title = pageTitle + ' — StudyBuddy Pro';

  // Fehler-Rendering (synchron + asynchron)
  const _routerError = (e) => {
    console.error('[Router]', e);
    content.innerHTML = `<div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:16px">⚠️</div>
      <h2>${t('common.error_loading')}</h2>
      <p style="color:var(--t3);margin-top:8px">${safe(e.message)}</p>
      <button class="btn btn-primary" style="margin-top:24px" onclick="goPage('dashboard')">${t('common.back_dashboard')}</button>
    </div>`;
  };
  try {
    // render() kann synchron (void) oder asynchron (Promise) sein
    const ret = render(content, params);
    if (ret instanceof Promise) ret.catch(_routerError);
  } catch(e) { _routerError(e); }
}

/**
 * Bewertet eine Karteikarte nach dem SM-2-ähnlichen Spaced-Repetition-Algorithmus.
 * Passt Level und nächstes Fälligkeitsdatum an, vergibt XP und rendert neu.
 * @param {string} id     — Karten-ID
 * @param {string} subj   — Fachname
 * @param {0|1|2|3} rating — 0=Falsch, 1=Schwer, 2=Ok, 3=Leicht
 */
function rateCard(id, subj, rating) {
  const cards = D.cards[subj]||[];
  const card = cards.find(c=>c.id===id) || cards[FC.idx];
  if (!card) return;

  const newLevel = Math.max(0, Math.min(4, (card.level||0) + (rating >= 2 ? 1 : -1)));
  const daysUntilNext = CFG.SR_DAYS[newLevel] * 86400000;
  card.level = newLevel;
  card.due = Date.now() + daysUntilNext;

  D.correct = (D.correct||0) + (rating >= 2 ? 1 : 0);
  D.total = (D.total||0) + 1;
  D.xp = (D.xp||0) + (rating >= 2 ? CFG.XP.CARD : CFG.XP.CARD_WRONG);
  save(); updateXP();

  const due = (D.cards[subj]||[]).filter(c=>(c.due||0)<=Date.now());
  if (due.length) FC.idx = (FC.idx + 1) % due.length;
  FC.flipped = false;
  renderFC(document.getElementById('content'));
}

function manualAddCard() {
  const front = document.getElementById('nf')?.value.trim();
  const back = document.getElementById('nb')?.value.trim();
  if (!front || !back) return toast(t('toast.fill_card'));
  if (!D.cards[FC.subj]) D.cards[FC.subj] = [];
  D.cards[FC.subj].push({id:'c'+Date.now(),front,back,level:0,due:0});
  save(); toast(t('toast.card_added'));
  document.getElementById('nf').value=''; document.getElementById('nb').value='';
  renderFC(document.getElementById('content'));
}

/**
 * Generiert Karteikarten aus einem Freitext via KI.
 * Parst das JSON-Array aus der KI-Antwort und fügt die Karten dem aktuellen Fach hinzu.
 * @async
 * @returns {Promise<void>}
 */
async function genCards() {
  const text = document.getElementById('gen-t')?.value.trim();
  if (!text) return toast(t('toast.enter_text'));
  if (!hasActiveKey()) return toast(t('toast.need_api_key'));
  const num = parseInt(document.getElementById('gen-n')?.value||5);
  toast('🤖 KI erstellt Karten…');
  try {
    const sys = `Karteikarten-Ersteller für Klasse ${U.grade}. Antworte NUR mit JSON.`;
    const r = await ai([{role:'user',content:`${num} Karteikarten zu ${FC.subj} aus:\n${text.slice(0,2000)}\nNur JSON:[{"front":"Frage?","back":"Antwort"}]`}], sys, 1200);
    const parsed = JSON.parse(r.match(/\[[\s\S]*\]/)?.[0]||'[]');
    if (!parsed.length) throw new Error('Kein gültiges JSON');
    if (!D.cards[FC.subj]) D.cards[FC.subj] = [];
    parsed.forEach(c=>{ if(c.front&&c.back) D.cards[FC.subj].push({id:'c'+Date.now()+Math.random(),front:c.front,back:c.back,level:0,due:0}); });
    save(); toast(`🎉 ${parsed.length} Karten erstellt!`);
    document.getElementById('gen-t').value='';
    renderFC(document.getElementById('content'));
  } catch(e) { toast('❌ '+e.message); }
}

/**
 * Sendet eine Nutzernachricht an den KI-Tutor und zeigt die Antwort im Chat an.
 * Verwaltet den lokalen Gesprächsverlauf (tutorMsgs) — max. 6 Messages im Kontext.
 * @async
 * @returns {Promise<void>}
 */
async function sendMsg() {
  const inp = document.getElementById('chat-in');
  const text = inp?.value.trim();
  if (!text) return;
  if (!hasActiveKey()) return toast(t('toast.need_api_key'));
  inp.value = '';

  const msgs = document.getElementById('chat-msgs');
  msgs.innerHTML += `<div style="background:var(--pri);color:white;padding:12px 16px;border-radius:var(--r-md);max-width:85%;align-self:flex-end;font-size:14px;">${safe(text)}</div>`;
  msgs.innerHTML += `<div id="typing" style="color:var(--t3);font-size:13px;animation:pulse 1s infinite;">${t('tutor.typing')}</div>`;
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const sys = buildTutorPrompt(tutorSubj, U.grade, getCurrentLang());
    const history = tutorMsgs.slice(-6).map(m=>({role:m.role,content:m.content.slice(0,400)}));

    document.getElementById('typing')?.remove();
    tutorMsgs.push({role:'assistant',content:answer});
    msgs.innerHTML += `<div style="background:var(--bg-2);padding:12px 16px;border-radius:var(--r-md);max-width:85%;font-size:14px;line-height:1.6;">${safeHTML(answer.replace(/\n/g,'<br>'))}</div>`;
    D.xp = (D.xp||0) + CFG.XP.TUTOR; save(); updateXP();
  } catch(e) {
    document.getElementById('typing')?.remove();
    msgs.innerHTML += `<div style="background:#fee2e2;color:#991b1b;padding:12px 16px;border-radius:var(--r-md);max-width:85%;font-size:13px;">❌ ${safe(e.message)}</div>`;
  }
  msgs.scrollTop = msgs.scrollHeight;
}

/**
 * Startet eine neue Prüfung: generiert Fragen via KI (wenn Key vorhanden)
 * oder nutzt Fallback-Beispielfragen. Setzt EX-State und rendert die erste Frage.
 * @async
 * @returns {Promise<void>}
 */
async function startExam() {
  const subj = document.getElementById('ex-subj')?.value;
  const num = parseInt(document.getElementById('ex-num')?.value||5);
  const el = document.getElementById('content');
  el.innerHTML = `<div style="text-align:center;padding:60px"><div class="spinner" style="width:32px;height:32px;"></div><p style="margin-top:16px;color:var(--t3);">${t('exam.generating')}</p></div>`;

  let qs = [];
  if (hasActiveKey()) {
    try {
      const { sys, user: userMsg } = buildExamPrompt(subj, U.grade, getCurrentLang(), num);
      const r = await ai([{role:'user', content: userMsg}], sys, 2000);
      qs = JSON.parse(r.match(/\[[\s\S]*\]/)?.[0]||'[]')
        .filter(q => q.q && q.opts?.length === 4)
        .map(q => ({ ...q, correct: parseInt(q.correct, 10) || 0 })); // normalize to number
    } catch(e) { toast('❌ '+e.message); }
  }

  // Fallback: echte Lernfragen aus FALLBACK_QS wenn keine KI oder KI-Fehler
  if (!qs.length) {
    const bank = FALLBACK_QS[subj] || FALLBACK_QS['default'];
    qs = [...bank].sort(() => Math.random() - .5).slice(0, Math.min(num, bank.length));
  }

  EX = { active:true, qs, idx:0, score:0, subj, answered:false };
  try {
    renderExam(el);
  } catch(e) {
    console.error('[startExam renderExam]', e);
    if (el) el.innerHTML = `<div class="card" style="text-align:center;padding:40px;"><p style="color:var(--error);">❌ ${t('common.error_loading')}: ${safe(e.message)}</p><button class="btn btn-primary" style="margin-top:16px;" onclick="goPage('exam')">${t('exam.error_back')}</button></div>`;
  }
}

function renderExam(el) {
  if (EX.idx >= EX.qs.length) { endExam(el); return; }
  const q = EX.qs[EX.idx];
  const pct = Math.round((EX.idx)/EX.qs.length*100);
  el.innerHTML = `
    <div class="page-header"><h1>📝 ${safe(EX.subj)} — ${t('exam.question')} ${EX.idx+1}/${EX.qs.length}</h1></div>
    <div style="max-width:600px;margin:0 auto;">
      <div class="progress" style="margin-bottom:20px;"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="card" style="margin-bottom:16px;">
        <p style="font-size:17px;font-weight:600;line-height:1.5;" id="q-text">${safe(q.q)}</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;" id="opts">
        ${q.opts.map((o,i)=>`
          <button class="btn btn-secondary" onclick="answerQ(${i})" style="text-align:left;justify-content:flex-start;padding:14px 18px;">
            <span style="width:24px;height:24px;border-radius:50%;background:var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;">${['A','B','C','D'][i]}</span>
            ${safe(o)}
          </button>`).join('')}
      </div>
    </div>`;
}

/**
 * Verarbeitet die Antwort auf eine Prüfungsfrage.
 * Markiert richtige Antwort grün, falsche rot. Nach 1,2s nächste Frage.
 * @param {number} i — Index der gewählten Option (0–3)
 */
function answerQ(i) {
  if (EX.answered) return; // Doppelklick-Schutz
  EX.answered = true;

  const q = EX.qs[EX.idx];
  const correct = i === q.correct;
  if (correct) EX.score++;

  const btns = document.querySelectorAll('#opts button');
  btns.forEach((b,j) => {
    b.disabled = true;
    if (j === q.correct) { b.style.background = '#d1fae5'; b.style.borderColor = '#10b981'; }
    if (j === i && !correct) { b.style.background = '#fee2e2'; b.style.borderColor = '#ef4444'; }
  });

  setTimeout(() => {
    EX.idx++;
    EX.answered = false; // Guard zurücksetzen für nächste Frage
    renderExam(document.getElementById('content'));
  }, 1200);
}

function endExam(el) {
  EX.active = false;
  const pct = Math.round(EX.score/EX.qs.length*100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '💪';
  const msg = pct >= 80 ? t('exam.excellent') : pct >= 60 ? t('exam.good') : t('exam.practice');

  D.exams = [...(D.exams||[]), {id:'e'+Date.now(),subject:EX.subj,score:EX.score,total:EX.qs.length,date:new Date().toISOString()}];
  D.xp = (D.xp||0) + CFG.XP.EXAM; save(); updateXP();

  el.innerHTML = `
    <div style="text-align:center;padding:60px 20px;max-width:480px;margin:0 auto;">
      <div style="font-size:64px;margin-bottom:16px;">${emoji}</div>
      <h1 style="font-size:28px;">${msg}</h1>

  el.innerHTML = `
    <div class="page-header"><h1>${t('plan.title')}</h1><p>${t('plan.subtitle')}</p></div>
    <div class="grid-2">
      <div class="card">

        <div style="display:flex;flex-direction:column;gap:12px;">
          <div class="field"><label>${t('plan.title_label')}</label><input class="input" id="t-title" placeholder="${t('plan.title_ph')}"></div>
          <div class="grid-2">
            <div class="field"><label>${t('plan.subject_label')}</label><select class="input" id="t-subj">${subs.map(s=>`<option>${s}</option>`).join('')}</select></div>
            <div class="field"><label>${t('plan.due_label')}</label><input class="input" id="t-due" type="date" value="${today}"></div>

          <button class="btn btn-primary btn-sm" onclick="addTask()">${t('plan.add_btn')}</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">${t('plan.all_tasks')}</div></div>
        <div id="task-list" style="display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;">
          ${renderTaskList()}

      </div>

}

function renderTaskList() {
  const tasks = D.tasks||[];
  if (!tasks.length) return `<p style="color:var(--t3);text-align:center;padding:20px;">${t('plan.no_tasks')}</p>`;
  return tasks.map(t=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-2);border-radius:var(--r-md);${t.completed?'opacity:.5':''}">
      <input type="checkbox" ${t.completed?'checked':''} onchange="completeTask('${t.id}',this.checked);document.getElementById('task-list').innerHTML=renderTaskList();" style="cursor:pointer;">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500;${t.completed?'text-decoration:line-through':''}">${safe(t.title)}</div>
        <div style="font-size:11px;color:var(--t3);">${t.subject||''} ${t.due?'· '+t.due:''}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="deleteTask('${t.id}')">🗑</button>
    </div>`).join('');
}

function addTask() {
  const title = document.getElementById('t-title')?.value.trim();
  const subj = document.getElementById('t-subj')?.value;
  const due = document.getElementById('t-due')?.value;
  if (!title) return toast(t('toast.enter_title'));
  D.tasks = [...(D.tasks||[]), {id:'t'+Date.now(),title,subject:subj,due,completed:false}];
  save(); toast(t('toast.task_added'));
  document.getElementById('t-title').value='';
  document.getElementById('task-list').innerHTML = renderTaskList();
}

function deleteTask(id) {
  D.tasks = (D.tasks||[]).filter(t=>t.id!==id); save();
  document.getElementById('task-list').innerHTML = renderTaskList();
}

// PAGE: POMODORO
// ═══════════════════════════════════════════════════════════════════════════
let PO = { running:false, work:25, break:5, sec:0, isBreak:false, timer:null, sessions:0 };

function pomodoro(el) {
  clearInterval(PO.timer); PO.timer=null;
  PO.sec = PO.work * 60; PO.isBreak=false; PO.running=false;
  renderPomo(el);
}

function renderPomo(el) {
  const min = Math.floor(PO.sec/60).toString().padStart(2,'0');
  const sec = (PO.sec%60).toString().padStart(2,'0');
  const progress = PO.isBreak ? (1-(PO.sec/(PO.break*60)))*100 : (1-(PO.sec/(PO.work*60)))*100;
  el.innerHTML = `
    <div class="page-header"><h1>${t('pomo.title')}</h1><p>${t('pomo.subtitle')}</p></div>
    <div style="max-width:400px;margin:0 auto;text-align:center;">
      <div class="card" style="padding:40px;">
        <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:${PO.isBreak?'var(--acc-green)':'var(--pri)'};margin-bottom:16px;">
          ${PO.isBreak?t('pomo.break'):t('pomo.focus')} · ${t('pomo.session')} ${PO.sessions+1}
        </div>
        <div style="font-size:64px;font-weight:800;letter-spacing:-2px;color:var(--t1);font-variant-numeric:tabular-nums;">${min}:${sec}</div>
        <div class="progress" style="margin:20px 0;height:8px;"><div class="progress-bar" style="width:${progress}%;background:${PO.isBreak?'var(--acc-green)':'var(--pri)'}"></div></div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:8px;">
          <button class="btn btn-primary btn-lg" onclick="togglePomo()">${PO.running?t('pomo.pause_btn'):t('pomo.start_btn')}</button>
          <button class="btn btn-secondary" onclick="resetPomo()">${t('pomo.reset')}</button>
        </div>
      </div>
      <div class="card" style="margin-top:16px;">
        <div style="display:flex;justify-content:space-around;">
          <div><div style="font-size:13px;color:var(--t3);">${t('pomo.focus_label')}</div>
            <input type="number" value="${PO.work}" min="5" max="60" class="input" style="width:60px;text-align:center;" onchange="PO.work=parseInt(this.value)||25;if(!PO.running){PO.sec=PO.work*60;renderPomo(document.getElementById('content'));}">
          </div>
          <div><div style="font-size:13px;color:var(--t3);">${t('pomo.break_label')}</div>
            <input type="number" value="${PO.break}" min="1" max="30" class="input" style="width:60px;text-align:center;" onchange="PO.break=parseInt(this.value)||5;">
          </div>
          <div><div style="font-size:13px;color:var(--t3);">${t('pomo.sessions')}</div>
            <div style="font-size:24px;font-weight:700;">${PO.sessions}</div>
          </div>
        </div>
      </div>
    </div>`;
}

function togglePomo() {
  if (PO.running) {
    clearInterval(PO.timer); PO.running=false;
  } else {
    PO.running=true;
    PO.timer = setInterval(()=>{
      PO.sec--;
      if (PO.sec <= 0) {
        if (!PO.isBreak) {
          PO.sessions++; PO.isBreak=true; PO.sec=PO.break*60;
          D.xp=(D.xp||0)+CFG.XP.POMO; save(); updateXP();
          toast(t('pomo.done', CFG.XP.POMO));
        } else {
          PO.isBreak=false; PO.sec=PO.work*60;
          toast(t('pomo.break_over'));
        }
      }
      if (_page === 'pomodoro') renderPomo(document.getElementById('content'));
    }, 1000);
  }
  if (_page === 'pomodoro') renderPomo(document.getElementById('content'));
}

function resetPomo() {
  clearInterval(PO.timer); PO.running=false; PO.isBreak=false; PO.sec=PO.work*60;
  if (_page === 'pomodoro') renderPomo(document.getElementById('content'));
}

// PAGE: ELTERN-DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════
async function parentDash(el) {
  const children = U.children||[];

  // Kinder-Stats aus Supabase nachladen (falls stats-Spalte vorhanden)
  if (sb && children.length) {
    try {
      const { data } = await sb.from('children')
        .select('id, name, grade, stats')
        .eq('parent_id', U.id);
      if (data) {
        data.forEach(row => {
          const c = children.find(x => x.id === row.id);
          if (c && row.stats) c.dbStats = row.stats;
        });
      }
    } catch(e) {}
  }

  // Kinderdaten aus localStorage (selbes Gerät) oder DB-Stats
  function childStats(c) {
    try { return { ...JSON.parse(localStorage.getItem('sb_data_'+c.id)||'{}'), ...(c.dbStats||{}) }; }
    catch { return c.dbStats || {}; }
  }

  // XP der letzten 7 Tage aus Sessions berechnen
  function weeklyXP(c) {
    const st = childStats(c);
    if (st.weeklyXP) return st.weeklyXP; // DB-Wert
    // Aus localStorage sessions berechnen
    const sessions = st.sessions || [];
    const days = Array(7).fill(0);
    const now = Date.now();
    sessions.forEach(s => {
      const d = Math.floor((now - new Date(s.created_at).getTime()) / 86400000);
      if (d >= 0 && d < 7) days[6 - d] += (s.xp_earned || 0);
    });
    return days;
  }

  const COLORS = ['rgba(99,102,241,.75)','rgba(139,92,246,.75)','rgba(16,185,129,.75)','rgba(245,158,11,.75)'];

  el.innerHTML = `
    <div class="page-header">
      <h1>👨‍👩‍👧 Eltern-Dashboard</h1>
      <p>${children.length} Kinder · Lernfortschritt auf einen Blick</p>
    </div>
    ${!children.length ? `
      <div class="card" style="text-align:center;padding:48px;">
        <div style="font-size:48px;margin-bottom:16px;">👧</div>
        <h2>Noch keine Kinder</h2>
        <p style="color:var(--t3);margin-top:8px;">Füge deine Kinder hinzu um ihren Lernfortschritt zu sehen.</p>
        <button class="btn btn-primary" style="margin-top:20px;" onclick="goPage('children')">Kinder hinzufügen →</button>
      </div>` : `
    <div class="grid-2" style="margin-bottom:24px;">
      ${children.map(c => {
        const st = childStats(c);
        const xp = st.xp || 0;
        const streak = st.streak || 0;
        const correct = st.correct || 0;
        const total = st.total || 0;
        const pct = total ? Math.round(correct/total*100) : 0;
        const lastStudy = st.lastStudy ? new Date(st.lastStudy).toLocaleDateString('de-DE') : '—';
        return `
        <div class="card card-hover" style="cursor:pointer;" onclick="goPage('children')">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
            <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--sec));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px;">${(c.name||'K')[0]}</div>
            <div>
              <div style="font-weight:700;">${safe(c.name)}</div>
              <div style="font-size:12px;color:var(--t3);">Klasse ${c.grade} · Zuletzt: ${lastStudy}</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
            <div style="text-align:center;background:var(--bg-2);padding:10px;border-radius:var(--r-md);">
              <div style="font-size:20px;font-weight:800;color:var(--pri);">${xp}</div>
              <div style="font-size:10px;color:var(--t3);">XP</div>
            </div>
            <div style="text-align:center;background:var(--bg-2);padding:10px;border-radius:var(--r-md);">
              <div style="font-size:20px;font-weight:800;color:var(--acc-yellow);">🔥${streak}</div>
              <div style="font-size:10px;color:var(--t3);">Streak</div>
            </div>
            <div style="text-align:center;background:var(--bg-2);padding:10px;border-radius:var(--r-md);">
              <div style="font-size:20px;font-weight:800;color:var(--acc-green);">${pct}%</div>
              <div style="font-size:10px;color:var(--t3);">Richtig</div>
            </div>
          </div>
        </div>`;}).join('')}
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">📈 XP letzte 7 Tage</div>
        <div style="font-size:12px;color:var(--t3);">Gesammelte Erfahrungspunkte pro Tag</div>
      </div>
      <canvas id="weekly-chart" height="100"></canvas>
    </div>
    <div class="card" style="margin-top:20px;">
      <div class="card-header"><div class="card-title">📚 Karteikarten gesamt</div></div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        ${children.map(c=>{
          const st = childStats(c);
          const cards = st.cards || {};
          const total = Object.values(cards).reduce((s,a)=>s+(a?.length||0),0);
          return `<div style="flex:1;min-width:120px;text-align:center;background:var(--bg-2);padding:14px;border-radius:var(--r-md);">
            <div style="font-size:24px;font-weight:800;color:var(--pri);">${total}</div>
            <div style="font-size:12px;color:var(--t2);margin-top:4px;">${safe(c.name)}</div>
          </div>`;}).join('')}
      </div>
    </div>`}`;

  // Chart mit echten Daten
  if (children.length && typeof Chart !== 'undefined') {
    setTimeout(()=>{
      const ctx = document.getElementById('weekly-chart');
      if (!ctx) return;
      const today = new Date();
      const labels = Array.from({length:7},(_,i)=>{
        const d = new Date(today); d.setDate(d.getDate()-6+i);
        return d.toLocaleDateString('de-DE',{weekday:'short'});
      });
      new Chart(ctx, {
        type:'bar',
        data:{
          labels,
          datasets: children.map((c,i)=>({
            label: c.name,
            data: weeklyXP(c),
            backgroundColor: COLORS[i] || COLORS[0],
            borderRadius: 4,
          }))
        },
        options:{
          responsive:true,
          plugins:{ legend:{ position:'top' } },
          scales:{ y:{ beginAtZero:true, title:{ display:true, text:'XP' } } }
        }
      });
    }, 100);
  }
}

async function addChildWithPin() {
  const name     = document.getElementById('c-name')?.value.trim();
  const grade    = document.getElementById('c-grade')?.value;
  const lang     = document.getElementById('c-lang')?.value || 'de';
  const schoolUrl= document.getElementById('c-url')?.value.trim() || '';
  const pin      = document.getElementById('c-pin')?.value.trim();
  if (!name)                 return toast('⚠️ Name eingeben!');
  if (pin.length < 8)        return toast('❌ PIN muss mind. 8 Zeichen haben!');
  if (!/[A-Za-z]/.test(pin)) return toast('❌ PIN muss mind. einen Buchstaben enthalten!');
  if (!/[0-9]/.test(pin))    return toast('❌ PIN muss mind. eine Zahl enthalten!');

  const child = { id: 'ch' + Date.now(), name, grade, pin, language: lang, schoolUrl };

  // In Supabase speichern
  if (sb) {
    const insertData = {
      parent_id: U.id, name, grade: Number(grade), pin,
      language: lang,
    };
    if (schoolUrl) insertData.school_url = schoolUrl;
    const { error } = await sb.from('children').insert(insertData);
    if (error) { toast('❌ ' + error.message); return; }
    // ID von Supabase holen
    const { data } = await sb.from('children').select('id').eq('parent_id', U.id).eq('name', name).single();
    if (data) child.id = data.id;
  }

  U.children = [...(U.children||[]), child];
  save();
  toast(`✅ ${name} hinzugefügt! PIN: ${pin}`);
  document.getElementById('c-name').value='';
  document.getElementById('c-pin').value='';
  document.getElementById('c-url').value='';
  childrenPage(document.getElementById('content'));
}

async function updatePin(childId) {
  const pin = document.getElementById('pin-' + childId)?.value.trim();
  if (pin.length < 8)        return toast('❌ PIN muss mind. 8 Zeichen haben!');
  if (!/[A-Za-z]/.test(pin)) return toast('❌ PIN muss mind. einen Buchstaben enthalten!');
  if (!/[0-9]/.test(pin))    return toast('❌ PIN muss mind. eine Zahl enthalten!');

  U.children = (U.children||[]).map(c => c.id === childId ? {...c, pin} : c);

  if (sb) {
    await sb.from('children').update({ pin }).eq('id', childId).eq('parent_id', U.id);
  }
  save();
  toast('✅ PIN aktualisiert!');
  childrenPage(document.getElementById('content'));
}

function removeChild(id) {
  if (!confirm('Kind wirklich entfernen? Alle Lernfortschritte werden gelöscht.')) return;
  U.children = (U.children||[]).filter(c=>c.id!==id);
  localStorage.removeItem('sb_data_' + id);
  if (sb) sb.from('children').delete().eq('id', id).eq('parent_id', U.id);
  save();
  childrenPage(document.getElementById('content'));
}

/**
 * Speichert einen neuen API Key für den gewählten Provider.
 * Ablauf für Auth-Nutzer:
 *   1. Key in AI[provider] setzen
 *   2. saveAIKeys() → localStorage (für Kind-Vererbung)
 *   3. Key per upsert in Supabase api_keys-Tabelle speichern
 *   4. AI[provider] leeren (Key nur noch im Backend)
 *   5. AI._hasDbKey + AI._configured aktualisieren
 * Für Demo/Kind: nur Schritt 1–2 (kein DB-Aufruf).
 * @async
 * @param {string} providerKey — Provider-Schlüssel ('claude' | 'openai' | 'gemini')
 * @returns {Promise<void>}
 */
async function saveProviderKey(providerKey) {
  const prov = PROVIDERS[providerKey];
  if (!prov) return;
  const key = document.getElementById(`s-ak-${providerKey}`)?.value.trim();
  if (!key || key === '••••••••••••') return toast(`${prov.emoji} ${prov.name} API Key eingeben!`);

  // ── Strikte Präfix-Prüfung ───────────────────────────────────────────────
  // Verhindert z.B. dass ein Anthropic-Key (sk-ant-…) als OpenAI-Key (sk-…) akzeptiert wird
  if (!key.startsWith(prov.keyPrefix)) {
    // Erkenne ob der Key zu einem anderen Provider gehört und gib einen hilfreichen Hinweis
    const wrongProv = Object.entries(PROVIDERS).find(([k,p]) => k !== providerKey && key.startsWith(p.keyPrefix));
    if (wrongProv) {
      return toast(`❌ Das ist ein ${wrongProv[1].name}-Key! Bitte "${wrongProv[1].name}" als Anbieter wählen.`);
    }
    return toast(`❌ Ungültiger Key — muss mit "${prov.keyPrefix}" beginnen`);
  }
  // Anthropic-Keys beginnen mit sk-ant- ; OpenAI-Keys mit sk- aber NICHT sk-ant-
  if (providerKey === 'openai' && key.startsWith('sk-ant-')) {
    return toast('❌ Das ist ein Anthropic/Claude Key! Bitte "Claude (Anthropic)" als Anbieter wählen.');
  }

  // ── Verbindungstest ──────────────────────────────────────────────────────
  const btn = document.querySelector(`button[onclick="saveProviderKey('${providerKey}')"]`);
  const origText = btn?.innerHTML;
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳ Teste Verbindung…'; }
  toast(`${prov.emoji} Verbindung wird getestet…`);

  let testOk = false;
  let testError = '';
  try {
    const result = await testKeyConnection(providerKey, key);
    testOk = result.ok;
    testError = result.error || '';
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = origText; }
  }

  if (!testOk) {
    toast(`❌ ${prov.emoji} Verbindung fehlgeschlagen: ${testError}`);
    return; // Key NICHT speichern — "aktiv" wird nicht gesetzt
  }

  // ── Key speichern (nur nach erfolgreichem Test) ──────────────────────────
  AI[providerKey] = key;
  AI.provider = providerKey;
  await saveAIKeys();

  // Authentifizierte Nutzer: Key zusätzlich in Supabase DB speichern (sicherer)
  if (sb && !U?.isChild) {
    try {
      await sb.from('api_keys').upsert(
        { user_id: U.id, provider: providerKey, api_key: key, saved_at: new Date().toISOString() },
        { onConflict: 'user_id,provider' }
      );
      // In-Memory-Key leeren — Key liegt jetzt sicher im Backend.
      // localStorage-Eintrag MIT Key bleibt erhalten: Kinder erben ihn vom Eltern-Account.
      AI[providerKey] = ''; // Browser hält Key nicht mehr im RAM
      AI._hasDbKey = true;
      if (!AI._configured) AI._configured = [];
      if (!AI._configured.includes(providerKey)) AI._configured.push(providerKey);
      // KEIN zweites saveAIKeys() — der erste Aufruf (mit dem echten Key) bleibt in localStorage
      toast(`✅ ${prov.emoji} ${prov.name} verbunden & sicher im Backend gespeichert!`);
    } catch(e) {
      toast(`✅ ${prov.emoji} ${prov.name} verbunden & lokal gespeichert!`);
    }
  } else {
    toast(`✅ ${prov.emoji} ${prov.name} verbunden!`);
  }
  settings(document.getElementById('content'));
}

/**
 * Testet einen API Key durch einen echten Minimal-Aufruf an den Proxy.
 * Wird immer mit dem Key direkt aufgerufen (nicht über JWT),
 * damit exakt dieser Key — unabhängig vom gespeicherten Zustand — geprüft wird.
 *
 * @async
 * @param {string} providerKey — 'claude' | 'openai' | 'gemini'
 * @param {string} key         — Der zu testende API Key
 * @returns {Promise<{ok:boolean, error?:string}>}
 */
/**
 * Testet einen API Key durch einen Minimal-Aufruf über den Supabase-Proxy.
 *
 * Warum Proxy statt direktem Aufruf?
 *   Anthropic, OpenAI und Gemini blockieren direkte Browser-Anfragen via CORS.
 *   Der Proxy läuft serverseitig (Deno) und hat keine CORS-Beschränkung.
 *
 * Auth-Strategie:
 *   1. Nutzer ist eingeloggt → User-JWT als Bearer
 *   2. Kein JWT vorhanden  → SB_KEY (Anon-JWT) als Bearer
 *   Zusätzlich: apiKey im Body → Proxy liest Key direkt, KEIN DB-Lookup.
 *
 * @async
 * @param {'claude'|'openai'|'gemini'} providerKey
 * @param {string} key — Der zu testende API Key
 * @returns {Promise<{ok:boolean, error?:string}>}
 */
async function testKeyConnection(providerKey, key) {
  try {
    // Schritt 1: Bearer-Token bestimmen (User-JWT > Anon-JWT)
    const headers = { 'Content-Type': 'application/json' };
    let bearerToken = SB_KEY; // Anon-JWT als Fallback — gültig für Edge-Function-Gateway
    if (sb) {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session?.access_token) bearerToken = session.access_token;
      } catch {}
    }
    headers['Authorization'] = 'Bearer ' + bearerToken;

    // Schritt 2: Proxy aufrufen — apiKey im Body → kein DB-Lookup im Proxy
    const r = await fetch(CFG.AI_PROXY, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        provider: providerKey,
        apiKey:   key,
        messages: [{ role: 'user', content: 'Reply with OK.' }],
        system:   'Reply with only the word OK.',
        maxTok:   5,
      }),
    });

    const data = await r.json().catch(() => ({}));

    if (!r.ok) {
      // Fehlermeldung direkt vom Anbieter weiterreichen (z.B. "invalid_api_key")
      const msg = data?.error || data?.message || '';
      if (r.status === 401) return { ok: false, error: 'Ungültiger API Key (401 Unauthorized)' };
      if (r.status === 403) return { ok: false, error: 'API Key hat keine Berechtigung (403 Forbidden)' };
      if (r.status === 429) return { ok: false, error: 'Rate Limit erreicht — kurz warten und erneut versuchen' };
      return { ok: false, error: msg || `Fehler ${r.status}` };
    }

    return { ok: true };
  } catch(e) {
    if (e instanceof TypeError) {
      return { ok: false, error: 'Server nicht erreichbar — bitte Internetverbindung prüfen' };
    }
    return { ok: false, error: e.message };
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// AKTIVITÄTS-LOG  (Ringpuffer, max. 100 Einträge, persistent in localStorage)
// ═══════════════════════════════════════════════════════════════════════════
const LOG_KEY = 'sb_applog';
const LOG_MAX = 100;

/** Erkennt den Log-Typ anhand von Emoji-Präfixen in der Meldung */
function _logType(msg) {
  if (/^✅|^\bOK\b|verbunden|gespeichert|hinzugefügt|erledigt|erstellt|gelöscht|aktualisiert/i.test(msg)) return 'success';
  if (/^❌|Fehler|fehlgeschlagen|ungültig|error/i.test(msg))  return 'error';
  if (/^⚠️|warnung|achtung|kein key|kein api/i.test(msg))    return 'warning';
  return 'info';
}

/**
 * Schreibt einen Eintrag in den persistenten Aktivitäts-Log.
 * Ältester Eintrag wird automatisch gelöscht wenn > LOG_MAX.
 * @param {string} msg — Nachrichtentext
 */
function appLog(msg) {
  const type = _logType(msg);
  let entries = [];
  try { entries = JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } catch {}
  entries.unshift({ ts: Date.now(), msg, type }); // neuester vorne
  if (entries.length > LOG_MAX) entries.length = LOG_MAX;
  try { localStorage.setItem(LOG_KEY, JSON.stringify(entries)); } catch {}

  // Badge aktualisieren (Anzahl Fehler seit letztem Öffnen)
  _updateLogBadge();
}

/** Liest alle Log-Einträge aus localStorage */
function _readLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } catch { return []; }
}

/** Aktualisiert den roten Fehler-Badge am Log-Button */
function _updateLogBadge() {
  const badge = document.getElementById('log-badge');
  if (!badge) return;
  const unseen = _readLog().filter(e => e.type === 'error' && !e.seen).length;
  if (unseen > 0) {
    badge.textContent = unseen > 99 ? '99+' : unseen;
    badge.style.display = 'block';
  } else {
    badge.style.display = 'none';
  }
}

let _logFilter = 'all'; // aktiver Filter

/** Rendert den Log-Inhalt (gefiltert) */
function _renderLogEntries() {
  const entries = _readLog().filter(e => _logFilter === 'all' || e.type === _logFilter);
  const el = document.getElementById('log-entries');
  const count = document.getElementById('log-count');
  const total = _readLog().length;
  if (count) count.textContent = `${total} Einträge gespeichert · max. ${LOG_MAX}`;

  const colors = {
    success: { bg: '#d1fae5', border: '#10b981', dot: '#059669' },
    error:   { bg: '#fee2e2', border: '#ef4444', dot: '#dc2626' },
    warning: { bg: '#fef3c7', border: '#f59e0b', dot: '#d97706' },
    info:    { bg: 'var(--bg-2)', border: 'var(--border)', dot: 'var(--t3)' },
  };
  const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };

  if (!entries.length) {
    el.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--t3);">
      <div style="font-size:40px;margin-bottom:12px;">📭</div>
      <div style="font-size:14px;">${_logFilter === 'all' ? 'Noch keine Einträge' : 'Keine Einträge in dieser Kategorie'}</div>
    </div>`;
    return;
  }

  el.innerHTML = entries.map(e => {
    const c = colors[e.type] || colors.info;
    const d = new Date(e.ts);
    const dateStr = d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });
    const timeStr = d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    return `<div style="
      display:flex;gap:12px;align-items:flex-start;
      padding:12px 20px;border-bottom:1px solid var(--border);
      transition:background .1s;
    " onmouseover="this.style.background='var(--bg-2)'" onmouseout="this.style.background=''">
      <div style="
        width:8px;height:8px;border-radius:50%;background:${c.dot};
        flex-shrink:0;margin-top:5px;
      "></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;color:var(--t1);line-height:1.5;word-break:break-word;">${safe(e.msg)}</div>
        <div style="font-size:11px;color:var(--t3);margin-top:3px;">${dateStr} · ${timeStr}</div>
      </div>
      <div style="font-size:16px;flex-shrink:0;">${icons[e.type]||'ℹ️'}</div>
    </div>`;
  }).join('');
}

/** Öffnet den Log-Drawer */
function openLog() {
  // Alle Fehler als gesehen markieren
  try {
    const entries = _readLog().map(e => ({ ...e, seen: true }));
    localStorage.setItem(LOG_KEY, JSON.stringify(entries));
  } catch {}
  _updateLogBadge();
  _logFilter = 'all';
  // Filter-Buttons zurücksetzen
  ['all','error','success','warning','info'].forEach(f => {
    const btn = document.getElementById('lf-' + f);
    if (btn) { btn.className = f === 'all' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-secondary'; }
  });

  const drawer = document.getElementById('log-drawer');
  const panel  = document.getElementById('log-panel');
  drawer.style.display = 'block';
  requestAnimationFrame(() => { panel.style.transform = 'translateX(0)'; });
  _renderLogEntries();
  document.addEventListener('keydown', _logEscHandler);
}

/** Schließt den Log-Drawer */
function closeLog() {
  const panel = document.getElementById('log-panel');
  panel.style.transform = 'translateX(100%)';
  setTimeout(() => { document.getElementById('log-drawer').style.display = 'none'; }, 260);
  document.removeEventListener('keydown', _logEscHandler);
}

function _logEscHandler(e) { if (e.key === 'Escape') closeLog(); }

/** Setzt Filter und rendert neu */
function filterLog(type) {
  _logFilter = type;
  ['all','error','success','warning','info'].forEach(f => {
    const btn = document.getElementById('lf-' + f);
    if (btn) btn.className = f === type ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-secondary';
  });
  _renderLogEntries();
}

/** Löscht alle Log-Einträge nach Bestätigung */
function clearLog() {
  if (!confirm('Alle Log-Einträge löschen?')) return;
  try { localStorage.removeItem(LOG_KEY); } catch {}
  _updateLogBadge();
  _renderLogEntries();
}

// ═══════════════════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════════════════
/**
 * Zeigt eine temporäre Benachrichtigung am unteren Bildschirmrand.
 * Schreibt die Meldung gleichzeitig in den persistenten Aktivitäts-Log.
 * @param {string} msg     — Nachrichtentext (darf Emojis enthalten)
 * @param {number} [dur=3000] — Anzeigedauer in Millisekunden
 */
function toast(msg, dur=3000) {
  appLog(msg); // ← immer loggen, auch wenn Toast schnell verschwindet
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), dur);
}

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .catch(e => console.warn('[SW] Registrierung fehlgeschlagen:', e));
  });
}
